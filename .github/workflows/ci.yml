name: CI

on:
  push:
  pull_request:

jobs:
  lightweight-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Unit tests import codon-metric and token-validation helpers that use
      # Bio.Data.CodonTable. Keep this CI-only dependency set lightweight.
      - run: python -m pip install PyYAML nbformat biopython
      - run: python scripts/check_repository_hygiene.py
      - run: python -m py_compile scripts/*.py tests/*.py
      - run: python -m unittest discover -s tests -v
      - run: python -m json.tool notebooks/codontransformer_finetune_colab.ipynb > /dev/null
