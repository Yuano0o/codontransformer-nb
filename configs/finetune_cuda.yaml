seed: 23

paths:
  model_dir: models/pretrained
  dataset_path: data/finetune/train.jsonl
  output_dir: outputs/finetune_cuda

training:
  accelerator: gpu
  devices: 1
  strategy: auto
  precision: 16-mixed
  batch_size: 2
  max_epochs: 15
  limit_train_batches: 1.0
  num_workers: 4
  accumulate_grad_batches: 4
  learning_rate: 0.00005
  warmup_fraction: 0.1
  mask_probability: 0.15
  save_every_n_steps: 512
  log_every_n_steps: 10
  deterministic: true
